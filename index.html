<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serensoft Wiki</title>
  <link rel="icon" href="assets/favicon.ico">
  <!-- Docsify theme — use vue (clean) or dark -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #4285f4;   /* Ditteau blue */
    }
    .sidebar { border-right: 3px solid #740049; }
    h1, h2, h3 { font-family: Georgia, serif; color: #740049; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Serensoft Wiki',
      repo: 'https://github.com/ditteau/serensoft-wiki',
      loadSidebar: true,
      loadNavbar: true,
      subMaxLevel: 3,          // auto-expand h1/h2/h3 in sidebar
      auto2top: true,
      search: {
        placeholder: 'Search the wiki',
        noData: 'Nothing found — try different terms',
        depth: 4
      },
      pagination: {
        previousText: '← Previous',
        nextText: 'Next →',
        crossChapter: true,
      },
      copyCode: { buttonText: 'Copy', errorText: 'Error', successText: 'Copied!' },
      plugins: [],
    }
  </script>

  <!-- Docsify core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

  <!-- Plugins — add/remove as needed -->
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>

function(hook) {
  hook.doneEach(function() {
    document.querySelectorAll('.app-nav a[href^="https://drive.google.com"]')
      .forEach(a => a.setAttribute('target', '_blank'));
  });
}
</body>
</html>
